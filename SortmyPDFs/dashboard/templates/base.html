<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title or 'SortmyPDFs Dashboard' }}</title>
  <style>
    :root {
      --pad: 22px;
    }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; color: #111; }
    main { padding: var(--pad); }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 14px; background: #fff; }
    .kpi { font-size: 28px; font-weight: 700; margin-top: 6px; }
    .muted { color: #666; font-size: 12px; }
    h1 { margin: 0 0 6px 0; }
    h2 { margin: 18px 0 8px 0; font-size: 16px; }
    h3 { margin: 14px 0 6px 0; font-size: 14px; }
    ul { margin: 6px 0 0 18px; }
    code { background: #f5f5f5; padding: 2px 5px; border-radius: 6px; }
    .err { color: #b00020; }
    .ok { color: #0b6; }

    table { width: 100%; border-collapse: collapse; }
    td, th { border-bottom: 1px solid #eee; padding: 6px 8px; text-align: left; font-size: 13px; }
    th { background: #fafafa; }

    .nav {
      display:flex; gap: 10px; align-items:center;
      padding: 12px 18px; border-bottom: 1px solid #e5e5e5; background: #fafafa;
      position: sticky; top: 0; z-index: 10;
    }
    .nav a {
      text-decoration:none; color:#222; padding: 6px 10px; border-radius: 8px;
      display: inline-flex; gap: 6px; align-items: center;
      white-space: nowrap;
    }
    .nav a.active { background: #111; color: #fff; }
    .nav .brand { font-weight: 700; margin-right: 10px; }
    .spacer { flex: 1; }
    .nav-right { display: inline-flex; gap: 10px; align-items: center; }

    .badge {
      display:inline-block; padding: 2px 7px; border-radius: 999px;
      font-size: 12px; line-height: 16px; background: #eaeaea; color:#111;
    }
    .badge.err { background: #ffe1e1; color: #8a0000; }
    .badge.ok { background: #dff7ea; color: #065f3b; }

    .btn {
      border: 1px solid #ddd; background: #fff; padding: 6px 10px; border-radius: 8px;
      cursor: pointer;
    }

    /* Forms */
    input[type="text"], textarea {
      width: 100%;
      max-width: 720px;
      box-sizing: border-box;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font: inherit;
    }
    textarea { max-width: 100%; }
    button {
      font: inherit;
      color: #111;
      border: 1px solid #ddd;
      background: #fff;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      white-space: nowrap;
      -webkit-text-fill-color: currentColor;
    }

    /* Alias chips */
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .chip { display: inline-flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 999px; border: 1px solid #eee; background: #fafafa; }
    .chip code { background: transparent; padding: 0; }
    .chip form { display: inline; margin: 0; }
    .chip button { padding: 3px 8px; border-radius: 999px; font-size: 12px; line-height: 1.2; }

    /* Mobile tweaks */
    @media (max-width: 640px) {
      :root { --pad: 14px; }
      /* Make the nav wrap into two rows on mobile so Refresh/Time aren't hidden */
      .nav { gap: 6px; padding: 10px 12px; flex-wrap: wrap; }
      .nav .spacer { display: none; }
      .nav-right { width: 100%; justify-content: space-between; }
      .nav .brand { display: none; }
      .btn { padding: 6px 10px; }
      td, th { font-size: 12px; padding: 6px 6px; }

      /* Actions / controls stack nicely */
      .actions { display: flex; flex-wrap: wrap; gap: 8px; }
      .actions form { margin: 0 !important; }
    }
  </style>
</head>
<body>
  <div class="nav">
    <div class="brand">SortmyPDFs</div>
    <a href="/" class="{{ 'active' if active=='overview' else '' }}">Übersicht
      {% if nav_errors is not none and nav_errors|int > 0 %}
        <span class="badge err">{{ nav_errors }} ERR</span>
      {% endif %}
      {% if nav_inbox is not none %}
        <span class="badge">Q {{ nav_inbox }}</span>
      {% endif %}
    </a>
    <a href="/state" class="{{ 'active' if active=='state' else '' }}">State Browser</a>
    <a href="/merge" class="{{ 'active' if active=='merge' else '' }}">Merges</a>
    <a href="/empty-folders" class="{{ 'active' if active=='empty' else '' }}">Leere Ordner</a>
    <a href="/aliases" class="{{ 'active' if active=='aliases' else '' }}">Aliase</a>
    <div class="spacer"></div>
    <div class="nav-right">
      <button class="btn" onclick="location.reload()">Refresh</button>
      <div class="muted">{{ now.isoformat() if now else '' }}</div>
    </div>
  </div>

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
